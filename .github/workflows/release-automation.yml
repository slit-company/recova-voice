name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Config files location
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Prefer PAT to trigger deployment workflow; fall back to GITHUB_TOKEN
          # so the release-planning check does not fail when the PAT secret is
          # absent in a fork or newly configured repository.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
