worker_processes 1;
pid /run/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log off;
    error_log /dev/stderr warn;
    server_tokens off;
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8443 ssl;
        ssl_protocols TLSv1.3;
        ssl_certificate /run/secrets/f12-server-certificate;
        ssl_certificate_key /run/secrets/f12-server-key;
        ssl_client_certificate /run/secrets/f12-client-ca-certificate;
        ssl_verify_client optional;
        ssl_verify_depth 2;
        proxy_set_header Host recova-backend;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";
        proxy_set_header X-Api-Key "";
        proxy_set_header X-Recova-Verified-Mtls-Identity $ssl_client_s_dn;
        proxy_set_header X-Recova-Verified-Mtls-Issuer $ssl_client_i_dn;
        proxy_set_header X-Recova-Onnuri-Endpoint-Credential $http_x_recova_onnuri_endpoint_credential;

        location = /api/v1/internal/onnuri-smoke/ready {
            if ($ssl_client_verify != SUCCESS) {
                return 401;
            }
            proxy_pass http://recova-backend:8000;
        }

        location ^~ /api/v1/internal/onnuri-smoke/ {
            if ($ssl_client_verify != SUCCESS) {
                return 401;
            }
            proxy_pass http://recova-backend:8000;
        }

        location = /api/v1/telephony/jambonz/onnuri-smoke/media {
            proxy_pass http://recova-backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host recova-backend;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie "";
            proxy_set_header X-Api-Key "";
            proxy_set_header X-Recova-Verified-Mtls-Identity "";
            proxy_set_header X-Recova-Verified-Mtls-Issuer "";
            proxy_set_header X-Recova-Onnuri-Endpoint-Credential "";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            return 404;
        }
    }
}
